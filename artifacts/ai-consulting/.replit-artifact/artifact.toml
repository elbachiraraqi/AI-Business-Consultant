kind = "web"
previewPath = "/"
title = "AI Consulting Website"
version = "1.0.0"
id = "artifacts/ai-consulting"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19798

[services.development]
run = "pnpm --filter @workspace/ai-consulting run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-consulting", "run", "build" ]
publicDir = "artifacts/ai-consulting/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19798"
BASE_PATH = "/"
